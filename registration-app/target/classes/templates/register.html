<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>User Registration</h1>
        <p class="subtitle">Create your account with a clean Spring Boot registration form</p>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" placeholder="Enter your full name">
                <small class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="Enter your email">
                <small class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phone}" placeholder="Enter your phone number">
                <small class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
            </div>

            <div class="input-group">
                <label>City</label>
                <input type="text" th:field="*{city}" placeholder="Enter your city">
                <small class="error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></small>
            </div>

            <button type="submit">Register Now</button>
        </form>

        <div class="footer-links">
            <a href="/users">View Registered Users</a>
        </div>
    </div>
</div>
</body>
</html>
